<!DOCTYPE html>
<html>
<head>
    <title>Predict & Pour — Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url("/static/background-texture.png") repeat;
            opacity: 0.18;
            z-index: -1;
            pointer-events: none;
        }

        /* Header */
        .admin-header {
            background: rgba(20, 20, 20, 0.95);
            border-bottom: 3px solid #EBBB40;
            padding: 16px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .admin-header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .admin-header img { height: 40px; }
        .admin-header h1 {
            color: #EBBB40;
            font-size: 22px;
        }
        .admin-header h1 span {
            color: #999;
            font-weight: normal;
            font-size: 16px;
        }
        .back-link {
            color: #EBBB40;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            padding: 8px 16px;
            border: 2px solid #EBBB40;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .back-link:hover {
            background: rgba(235, 187, 64, 0.2);
        }

        /* Auth gate */
        .auth-gate {
            text-align: center;
            padding: 80px 20px;
        }
        .auth-gate h2 { color: #EBBB40; margin-bottom: 10px; }
        .auth-gate p { color: #999; }

        /* Main content */
        .admin-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(235, 187, 64, 0.1);
            border: 2px solid rgba(235, 187, 64, 0.3);
            border-radius: 10px;
            padding: 16px 24px;
            flex: 1;
            text-align: center;
        }
        .stat-card .stat-number {
            font-size: 28px;
            font-weight: 900;
            color: #EBBB40;
        }
        .stat-card .stat-label {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }

        /* Section */
        .section {
            margin-bottom: 30px;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .section-header h2 {
            color: #EBBB40;
            font-size: 18px;
        }

        /* Add user form */
        .add-form {
            background: rgba(20, 20, 20, 0.8);
            border: 2px solid rgba(235, 187, 64, 0.3);
            border-radius: 12px;
            padding: 20px;
            display: none;
        }
        .add-form.show { display: block; }
        .form-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 160px;
        }
        .form-group label {
            color: #EBBB40;
            font-size: 12px;
            font-weight: bold;
        }
        .form-group input {
            padding: 10px 12px;
            border: 2px solid rgba(235, 187, 64, 0.4);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #EBBB40;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-gold {
            background: #EBBB40;
            color: #000;
        }
        .btn-gold:hover { background: #d4a634; }
        .btn-outline {
            background: transparent;
            color: #EBBB40;
            border: 2px solid #EBBB40;
        }
        .btn-outline:hover { background: rgba(235, 187, 64, 0.15); }
        .btn-danger {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.4);
        }
        .btn-danger:hover { background: rgba(255, 107, 107, 0.35); }
        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* User table */
        .user-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(20, 20, 20, 0.8);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(235, 187, 64, 0.3);
        }
        .user-table th {
            background: rgba(235, 187, 64, 0.15);
            color: #EBBB40;
            padding: 12px 16px;
            text-align: left;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .user-table td {
            padding: 12px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 14px;
        }
        .user-table tr:hover td {
            background: rgba(235, 187, 64, 0.05);
        }

        /* Status badge */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-active {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border: 1px solid rgba(76, 175, 80, 0.4);
        }
        .badge-inactive {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.4);
        }

        .actions-cell {
            display: flex;
            gap: 6px;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 22px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast-success {
            background: rgba(76, 175, 80, 0.95);
            color: #fff;
        }
        .toast-error {
            background: rgba(255, 107, 107, 0.95);
            color: #fff;
        }

        /* Reset password modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: url("/static/wood-texture.jpg") center center;
            background-size: cover;
            border: 3px solid #EBBB40;
            border-radius: 14px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            position: relative;
        }
        .modal-box::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 0;
            border-radius: 12px;
        }
        .modal-content {
            position: relative;
            z-index: 1;
        }
        .modal-content h3 {
            color: #EBBB40;
            margin-bottom: 16px;
            font-size: 18px;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
    </style>
</head>
<body>

    <div class="admin-header">
        <div class="admin-header-left">
            <img src="/static/pp-logo.png" alt="P&P">
            <h1>Admin Panel <span>— User Management</span></h1>
        </div>
        <a href="/" class="back-link">← Back to Home</a>
    </div>

    <!-- Auth gate (shown if not admin) -->
    <div class="auth-gate" id="authGate">
        <h2>Admin Access Required</h2>
        <p>Please log in as an administrator to access this page.</p>
    </div>

    <!-- Admin content (shown if admin) -->
    <div class="admin-content" id="adminContent" style="display: none;">

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-number" id="totalUsers">—</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="activeUsers">—</div>
                <div class="stat-label">Active</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="inactiveUsers">—</div>
                <div class="stat-label">Inactive</div>
            </div>
        </div>

        <!-- Add User Section -->
        <div class="section">
            <div class="section-header">
                <h2>Users</h2>
                <button class="btn btn-gold" onclick="toggleAddForm()">+ Add User</button>
            </div>

            <div class="add-form" id="addForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="newUsername" placeholder="jsmith">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="newEmail" placeholder="john@company.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="newPassword" placeholder="Temporary password">
                    </div>
                    <button class="btn btn-gold" onclick="addUser()" style="margin-bottom: 1px;">Create</button>
                    <button class="btn btn-outline" onclick="toggleAddForm()" style="margin-bottom: 1px;">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Users Table -->
        <table class="user-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Status</th>
                    <th>Last Login</th>
                    <th>Created</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="usersBody">
                <tr><td colspan="7" style="text-align:center; color:#999; padding:30px;">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Reset Password Modal -->
    <div class="modal-overlay" id="resetModal">
        <div class="modal-box">
            <div class="modal-content">
                <h3>Reset Password</h3>
                <p style="color:#ccc; margin-bottom:14px;" id="resetUserLabel">Set new password for this user:</p>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="resetPasswordInput" placeholder="New password">
                </div>
                <div class="modal-actions">
                    <button class="btn btn-gold" onclick="confirmResetPassword()">Reset Password</button>
                    <button class="btn btn-outline" onclick="closeResetModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
    let currentResetUserId = null;

    // ========== Auth Check ==========
    async function checkAdmin() {
        try {
            const res = await fetch('/api/auth/me', { credentials: 'include' });
            const data = await res.json();

            if (data.logged_in && data.is_admin) {
                document.getElementById('authGate').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadUsers();
            } else if (data.logged_in) {
                document.getElementById('authGate').innerHTML =
                    '<h2>Access Denied</h2><p>Your account does not have admin privileges.</p>';
            }
        } catch (e) {
            console.error('Admin auth check failed:', e);
        }
    }

    // ========== Load Users ==========
    async function loadUsers() {
        try {
            const res = await fetch('/api/admin/users', { credentials: 'include' });
            if (!res.ok) throw new Error('Failed to load users');
            const users = await res.json();

            // Stats
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('activeUsers').textContent = users.filter(u => u.is_active).length;
            document.getElementById('inactiveUsers').textContent = users.filter(u => !u.is_active).length;

            // Table
            const tbody = document.getElementById('usersBody');
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#999; padding:30px;">No users yet. Click "+ Add User" to create one.</td></tr>';
                return;
            }

            tbody.innerHTML = users.map(u => `
                <tr>
                    <td style="color:#999;">${u.id}</td>
                    <td style="font-weight:bold;">${escapeHtml(u.username)}</td>
                    <td style="color:#ccc;">${escapeHtml(u.email)}</td>
                    <td>
                        <span class="badge ${u.is_active ? 'badge-active' : 'badge-inactive'}">
                            ${u.is_active ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                    <td style="color:#999; font-size:13px;">${u.last_login ? formatDate(u.last_login) : 'Never'}</td>
                    <td style="color:#999; font-size:13px;">${formatDate(u.created_at)}</td>
                    <td>
                        <div class="actions-cell">
                            <button class="btn btn-small btn-outline" onclick="toggleUser(${u.id}, ${u.is_active})">
                                ${u.is_active ? 'Disable' : 'Enable'}
                            </button>
                            <button class="btn btn-small btn-outline" onclick="openResetModal(${u.id}, '${escapeHtml(u.username)}')">
                                Reset PW
                            </button>
                            <button class="btn btn-small btn-danger" onclick="deleteUser(${u.id}, '${escapeHtml(u.username)}')">
                                Delete
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        } catch (e) {
            console.error('Load users error:', e);
            showToast('Failed to load users', 'error');
        }
    }

    // ========== Add User ==========
    async function addUser() {
        const username = document.getElementById('newUsername').value.trim();
        const email = document.getElementById('newEmail').value.trim();
        const password = document.getElementById('newPassword').value;

        if (!username || !email || !password) {
            showToast('All fields are required', 'error');
            return;
        }

        try {
            const res = await fetch('/api/admin/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ username, email, password })
            });

            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Failed to create user');

            showToast(`User "${username}" created`, 'success');
            document.getElementById('newUsername').value = '';
            document.getElementById('newEmail').value = '';
            document.getElementById('newPassword').value = '';
            toggleAddForm();
            loadUsers();
        } catch (e) {
            showToast(e.message, 'error');
        }
    }

    // ========== Toggle Active ==========
    async function toggleUser(userId, currentlyActive) {
        const action = currentlyActive ? 'disable' : 'enable';
        try {
            const res = await fetch(`/api/admin/users/${userId}/toggle`, {
                method: 'PUT',
                credentials: 'include'
            });
            if (!res.ok) throw new Error('Failed to update user');
            showToast(`User ${action}d`, 'success');
            loadUsers();
        } catch (e) {
            showToast(e.message, 'error');
        }
    }

    // ========== Delete User ==========
    async function deleteUser(userId, username) {
        if (!confirm(`Delete user "${username}"? This cannot be undone.`)) return;

        try {
            const res = await fetch(`/api/admin/users/${userId}`, {
                method: 'DELETE',
                credentials: 'include'
            });
            if (!res.ok) throw new Error('Failed to delete user');
            showToast(`User "${username}" deleted`, 'success');
            loadUsers();
        } catch (e) {
            showToast(e.message, 'error');
        }
    }

    // ========== Reset Password ==========
    function openResetModal(userId, username) {
        currentResetUserId = userId;
        document.getElementById('resetUserLabel').textContent = `Set new password for "${username}":`;
        document.getElementById('resetPasswordInput').value = '';
        document.getElementById('resetModal').classList.add('show');
        document.getElementById('resetPasswordInput').focus();
    }

    function closeResetModal() {
        document.getElementById('resetModal').classList.remove('show');
        currentResetUserId = null;
    }

    async function confirmResetPassword() {
        const password = document.getElementById('resetPasswordInput').value;
        if (!password) { showToast('Enter a new password', 'error'); return; }

        try {
            const res = await fetch(`/api/admin/users/${currentResetUserId}/password`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ password })
            });
            if (!res.ok) throw new Error('Failed to reset password');
            showToast('Password reset', 'success');
            closeResetModal();
        } catch (e) {
            showToast(e.message, 'error');
        }
    }

    // ========== Helpers ==========
    function toggleAddForm() {
        document.getElementById('addForm').classList.toggle('show');
    }

    function showToast(msg, type) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = `toast toast-${type} show`;
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function formatDate(dateStr) {
        if (!dateStr) return '—';
        const d = new Date(dateStr);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ========== Init ==========
    checkAdmin();
    </script>
</body>
</html>
